<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мислења</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <h2 class="logo">ПЛАНЕТ ФИТНЕС</h2>
        <div class="nav-buttons">
            <button onclick="window.location.href='./index.html'">Почетна</button>
            <button onclick="window.location.href='./shop.html'">Продавница</button>
        </div>
    </nav>
</header>

<section class="testimonials-page">
    <h1>Мислења</h1>
    <p id="pageMessage">Вчитување...</p>
    <div class="testimonial-container"></div>
</section>

<script>
async function loadAllTestimonials() {
    const container = document.querySelector('.testimonial-container');
    const msg = document.getElementById('pageMessage');
    if (!container) return;
    msg.innerText = 'Вчитување...';

    try {
        const res = await fetch('/api/testimonials');
        if (!res.ok) throw new Error('Fetch failed');
        const data = await res.json();
        container.innerHTML = '';
        if (!data.length) {
            msg.innerText = 'Нема мислења.';
            return;
        }
        msg.innerText = `Пронајдени ${data.length} мислења`;
        data.forEach(t => {
            const div = document.createElement('div');
            div.classList.add('testimonial-card');
            const stars = '★'.repeat(t.rating || 0) + '☆'.repeat(5 - (t.rating || 0));
            div.innerHTML = `<div class="testimonial-rating">${stars}</div><p>"${t.message}"</p><h4>- ${t.name}</h4>`;
            container.appendChild(div);
        });
    } catch (err) {
        console.error(err);
        msg.innerText = 'Грешка при вчитување.';
    }
}

window.onload = loadAllTestimonials;
</script>

</body>
</html>
