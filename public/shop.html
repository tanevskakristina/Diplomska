
<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Shop</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">

        <h2 class="logo">ПЛАНЕТ ФИТНЕС SHOP</h2>

        <div>
            <button 
            onclick="window.location.href='./index.html'">
                Почетна
            </button>
           
        
            <button id="addProductBtn" onclick="window.location.href='./add-product.html'">
                Додади производ
            </button>
        </div>

    </nav>
</header>

<section class="shop-page">

    <h1> Fitness Shop</h1>

    <div class="shop-container" id="shopContainer">
        <!-- Products will be loaded here -->
    </div>

</section>

<div id="orderModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeOrder()">&times;</span>

        <h2> Нарачка</h2>

        <input type="text" id="customerName" placeholder="Име и презиме">

        <input type="text" id="customerAddress" placeholder="Адреса за достава">

        <input type="text" id="customerPhone" placeholder="Телефон">

        <h3 id="selectedProduct"></h3>

        <p>Плаќање при достава 🚚</p>

        <button onclick="finishOrder()">
            Потврди нарачка
        </button>

        <p id="orderMessage"></p>

    </div>

</div>

<script>

let currentProduct = "";

async function loadProducts() {
    try {
        const response = await fetch("/api/products");
        const products = await response.json();

        const container = document.getElementById("shopContainer");
        container.innerHTML = "";

        products.forEach(product => {
            const productCard = document.createElement("div");
            productCard.className = "product-card";

            productCard.innerHTML = `
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p class="product-price">${product.price} ден</p>
                <button onclick="orderProduct('${product.name}')">Нарачај</button>
            `;

            container.appendChild(productCard);
        });
    } catch (error) {
        console.error("Error loading products:", error);
    }
}

function orderProduct(product){
    currentProduct = product;
    document.getElementById("orderModal").style.display = "flex";
    document.getElementById("selectedProduct").innerText = "Производ: " + product;
}

function closeOrder(){
    document.getElementById("orderModal").style.display = "none";
}

function finishOrder(){
    const name = document.getElementById("customerName").value;
    const address = document.getElementById("customerAddress").value;
    const phone = document.getElementById("customerPhone").value;

    if(!name || !address || !phone){
        document.getElementById("orderMessage").innerText = "Пополнете ги сите полиња!";
        return;
    }

    document.getElementById("orderMessage").innerText = "Нарачката е успешно испратена!";

    console.log({
        product: currentProduct,
        name,
        address,
        phone,
        payment: "Плаќање при достава"
    });
}


function updateProductButton() {
    const token = localStorage.getItem("token");
    const addProductBtn = document.getElementById("addProductBtn");

    if (token) {
        addProductBtn.style.display = "none";
    } else {
        addProductBtn.style.display = "block";
    }
}

// Load products when page loads
window.onload = function() {
    loadProducts();
    updateProductButton();
    
};
</script>

</body>
</html>
