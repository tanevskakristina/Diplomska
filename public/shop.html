
<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Shop</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">

        <h2 class="logo">ПЛАНЕТ ФИТНЕС SHOP</h2>

        <div class="nav-buttons">
            <button onclick="window.location.href='./index.html'">
                Почетна
            </button>
            <button id="addProductBtn" onclick="window.location.href='./add-product.html'">
                Додади производ
            </button>
            <button id="adminOrdersBtn" onclick="window.location.href='./admin-orders.html'" style="display:none;">
                Нарачки
            </button>
        </div>

    </nav>
</header>

<section class="shop-page">

    <h1> Fitness Shop</h1>

    <div class="shop-layout">
        <div class="shop-main">
            <div class="filter-group">
                <label for="categoryFilter">Избери категорија:</label>
                <select id="categoryFilter">
                    <option value="all" selected>Сите категории</option>
                    <option value="Креатин">Креатин</option>
                    <option value="Протеин">Протеин</option>
                    <option value="Согорувач на масти">Согорувач на масти</option>
                    <option value="Гејнер">Гејнер</option>
                    <option value="Аминокиселини">Аминокиселини</option>
                </select>
            </div>

            <div class="shop-container" id="shopContainer">
                <!-- Products will be loaded here -->
            </div>
        </div>

    </div>

</section>

<div id="orderModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeOrder()">&times;</span>

        <h2> Нарачка</h2>

        <input type="text" id="customerName" placeholder="Име и презиме">

        <input type="email" id="customerEmail" placeholder="Email адреса">

        <input type="text" id="customerAddress" placeholder="Адреса за достава">

        <input type="text" id="customerPhone" placeholder="Телефон">

        <h3 id="selectedProduct"></h3>

        <p>Плаќање при достава 🚚</p>

        <button onclick="finishOrder()">
            Потврди нарачка
        </button>

        <p id="orderMessage"></p>

    </div>

</div>

<script>

let currentProductId = "";
let currentProductName = "";
let allProducts = [];

async function loadProducts() {
    try {
        const response = await fetch("/api/products");
        allProducts = await response.json();
        renderProducts();
    } catch (error) {
        console.error("Error loading products:", error);
    }
}

function renderProducts(filterCategory = "all") {
    const container = document.getElementById("shopContainer");
    container.innerHTML = "";

    const filtered = filterCategory === "all"
        ? allProducts
        : allProducts.filter(product => product.category === filterCategory);

    if (filtered.length === 0) {
        container.innerHTML = `<p class="empty-message">Нема производи во оваа категорија.</p>`;
        return;
    }

    filtered.forEach(product => {
        const productCard = document.createElement("div");
        productCard.className = "product-card";

        productCard.innerHTML = `
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p class="product-category">Категорија: ${product.category}</p>
            <p class="product-price">${product.price} ден</p>
            <button onclick="orderProduct('${product._id}')">Нарачај</button>
        `;

        container.appendChild(productCard);
    });
}

function orderProduct(productId){
    const product = allProducts.find(p => p._id === productId);
    currentProductId = productId;
    currentProductName = product ? product.name : "";
    document.getElementById("orderModal").style.display = "flex";
    document.getElementById("selectedProduct").innerText = "Производ: " + (product ? product.name : productId);
}

function closeOrder(){
    document.getElementById("orderModal").style.display = "none";
}

async function finishOrder(){
    const name = document.getElementById("customerName").value;
    const email = document.getElementById("customerEmail").value;
    const address = document.getElementById("customerAddress").value;
    const phone = document.getElementById("customerPhone").value;

    if(!name || !email || !address || !phone){
        document.getElementById("orderMessage").innerText = "Пополнете ги сите полиња!";
        return;
    }

    // Validate email format
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        document.getElementById("orderMessage").innerText = "Внесете валидна email адреса!";
        return;
    }

    try {
        const response = await fetch("/api/products/orders", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                productId: currentProductId,
                productName: currentProductName,
                customerName: name,
                customerEmail: email,
                customerAddress: address,
                customerPhone: phone
            })
        });

        if (response.ok) {
            document.getElementById("orderMessage").innerText = "Нарачката е успешно испратена! Проверете ја вашата email за потврда.";
            
            // Clear the form
            document.getElementById("customerName").value = "";
            document.getElementById("customerEmail").value = "";
            document.getElementById("customerAddress").value = "";
            document.getElementById("customerPhone").value = "";
            
            // Close modal after 2 seconds
            setTimeout(() => {
                closeOrder();
            }, 2000);
        } else {
            const error = await response.json();
            document.getElementById("orderMessage").innerText = error.message || "Грешка при пратање на нарачката.";
        }
    } catch (error) {
        console.error("Error:", error);
        document.getElementById("orderMessage").innerText = "Грешка при пратање на нарачката.";
    }
}

function updateProductButton() {
    const token = localStorage.getItem("token");
    const adminToken = localStorage.getItem("adminToken");
    const addProductBtn = document.getElementById("addProductBtn");
    const adminOrdersBtn = document.getElementById("adminOrdersBtn");

    if (adminToken) {
        addProductBtn.style.display = "inline-block";
        if (adminOrdersBtn) adminOrdersBtn.style.display = "inline-block";
    } else if (token) {
        addProductBtn.style.display = "none";
        if (adminOrdersBtn) adminOrdersBtn.style.display = "none";
    } else {
        addProductBtn.style.display = "block";
        if (adminOrdersBtn) adminOrdersBtn.style.display = "none";
    }
}

window.onload = function() {
    loadProducts();
    updateProductButton();
    document.getElementById("categoryFilter").addEventListener("change", (event) => {
        renderProducts(event.target.value);
    });
};
</script>

</body>
</html>
